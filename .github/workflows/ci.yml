name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --manifest-path apps/cli/Cargo.toml -- --check
      - run: cargo test --manifest-path apps/cli/Cargo.toml
      - run: cargo package --manifest-path apps/cli/Cargo.toml --list

  relay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: apps/relay
      - run: bun run typecheck
        working-directory: apps/relay
